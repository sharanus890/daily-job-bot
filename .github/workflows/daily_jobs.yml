name: Daily Job Bot v7.0

on:
  schedule:
    # 2:30 AM UTC = 8:00 AM IST (UTC+5:30)
    - cron: '30 2 * * *'
  workflow_dispatch:

# Required permissions for job tracker gist storage
permissions:
  contents: read

jobs:
  send-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job bot
        env:
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CANDIDATE_NAME: ${{ secrets.CANDIDATE_NAME }}
          CANDIDATE_PHONE: ${{ secrets.CANDIDATE_PHONE }}
          CANDIDATE_LINKEDIN: ${{ secrets.CANDIDATE_LINKEDIN }}
          CANDIDATE_GITHUB: ${{ secrets.CANDIDATE_GITHUB }}
          CANDIDATE_YOE: ${{ secrets.CANDIDATE_YOE }}
          CANDIDATE_EDUCATION: ${{ secrets.CANDIDATE_EDUCATION }}
          CANDIDATE_EXP_COMPANY: ${{ secrets.CANDIDATE_EXP_COMPANY }}
          CANDIDATE_EXP_ROLE: ${{ secrets.CANDIDATE_EXP_ROLE }}
          CANDIDATE_EXP_PERIOD: ${{ secrets.CANDIDATE_EXP_PERIOD }}
        run: python scripts/run_all.py

      - name: Upload email preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: email-preview
          path: email_preview.html
          if-no-files-found: ignore

      - name: Upload jobs data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-data
          path: jobs_found.json
          if-no-files-found: ignore

      - name: Upload tailored resumes artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tailored-resumes
          path: tailored_resumes.json
          if-no-files-found: ignore
